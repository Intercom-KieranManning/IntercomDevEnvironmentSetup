# Production Docker Compose — Intercom
# Usage (on remote server, from /opt/transparenc):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Images are built and pushed by each repo's own CI pipeline.
# This file only pulls pre-built :latest images from the registry.

networks:
  transparenc:
    driver: bridge

volumes:
  pgdata:

services:
  postgres_db:
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: docker.kmanning.ie:5000/intercom-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes: []
    environment:
      - AWS_ACCESS_KEY_ID=${aws_access_key_id}
      - AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}
      - DJANGO_DEBUG=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:8000/api/v1/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: docker.kmanning.ie:5000/intercom-dashboard:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes: []
