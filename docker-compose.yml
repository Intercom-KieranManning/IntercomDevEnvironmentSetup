networks:
  transparenc:
    driver: bridge

volumes:
  pgdata:
  client_tokens:
  device_oauth_config:

services:
  postgres_db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - transparenc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./APIServer
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${aws_access_key_id}
      - AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}
      - DJANGO_DEBUG=True
      - HONEYCOMB_API_KEY=${HONEYCOMB_API_KEY}
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - transparenc
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:8000/api/v1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  utility:
    build:
      context: ./APIServer
      dockerfile: Dockerfile.dev
    command: ["sh", "utility.sh"]
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${aws_access_key_id}
      - AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - device_oauth_config:/root/.config/intercom-api
      - client_tokens:/root/.config/intercomclient
    networks:
      - transparenc
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/utility-ready"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - VITE_APP_VERSION=${APP_VERSION:-0.0.0-dev}
      - VITE_HONEYCOMB_API_KEY=${VITE_HONEYCOMB_API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - transparenc

  clientpython:
    build:
      context: ./ClientPython
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - HTTP_API_BASE_URL=http://backend:8000
      - WEBSOCKET_API_BASE_URL=ws://backend:8000
      - HONEYCOMB_API_KEY=${HONEYCOMB_API_KEY}
    depends_on:
      utility:
        condition: service_healthy
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - client_tokens:/root/.config/intercomclient
      - device_oauth_config:/root/.config/intercom-api
    networks:
      - transparenc
