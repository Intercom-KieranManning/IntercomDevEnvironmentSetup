networks:
  transparenc:
    driver: bridge

volumes:
  pgdata:

services:
  postgres_db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - transparenc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: docker.kmanning.ie:5000/intercom-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${aws_access_key_id}
      - AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - transparenc
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:8000/api/v1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: docker.kmanning.ie:5000/intercom-dashboard:latest
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - transparenc
