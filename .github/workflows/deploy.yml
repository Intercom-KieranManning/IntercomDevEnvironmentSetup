name: Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, righteous]

    steps:
      - name: Log in to private Docker registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login docker.kmanning.ie:5000 -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull latest images
        run: |
          docker pull docker.kmanning.ie:5000/intercom-api:latest
          docker pull docker.kmanning.ie:5000/intercom-dashboard:latest
          docker pull docker.kmanning.ie:5000/intercom-python-client:latest

      - name: Write production .env
        run: echo "${{ secrets.DOT_ENV_REMOTE }}" > /opt/transparenc/.env

      - name: Update compose files
        run: |
          cd /opt/transparenc
          git fetch origin master
          git checkout origin/master -- docker-compose.yml infra/docker-compose.prod.yml

      - name: Start services
        run: |
          cd /opt/transparenc
          docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml up -d
